<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FxxKPDF Self-Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 1rem; }
    .pass { color: green; } .fail { color: red; } #results { line-height: 1.9; }
  </style>
</head>
<body>
  <h1>FxxKPDF Browser Self-Test</h1>
  <div id="results">Running…</div>
  <script type="module">
    const out = document.getElementById("results");
    let pass = 0, fail = 0;
    function check(name, ok) {
      const d = document.createElement("div");
      d.className = ok ? "pass" : "fail";
      d.textContent = (ok ? "✅ " : "❌ ") + name;
      out.appendChild(d);
      ok ? pass++ : fail++;
    }
    // Basic DOM checks
    check("document exists", true);
    check("script runs in browser", typeof window !== "undefined");

    // v0.3.0 checks
    check("JSZip is loaded", typeof window.JSZip !== "undefined");

    // Check version badge
    const badge = document.querySelector('[data-testid="version-badge"]');
    check("version badge shows v0.3.0", badge && badge.textContent.includes("v0.3.0"));

    // Check footer version
    const footer = document.querySelector('.footer-brand');
    check("footer shows v0.3.0", footer && footer.textContent.includes("v0.3.0"));

    // Check 13 tool panels
    const panels = [
      "panel-merge", "panel-split", "panel-manage", "panel-number",
      "panel-textwatermark", "panel-imagewatermark", "panel-signature",
      "panel-annotate", "panel-permissions", "panel-normalcopy",
      "panel-protect", "panel-metadata", "panel-imagepdf"
    ];
    for (const id of panels) {
      check(`tool panel ${id} exists`, !!document.getElementById(id));
    }

    // Check split mode selector
    check("split mode selector exists", !!document.getElementById("splitMode"));

    // Check manage range input
    check("manage range input exists", !!document.getElementById("manageRange"));
    check("manageDeleteRangeBtn exists", !!document.getElementById("manageDeleteRangeBtn"));
    check("manageKeepRangeBtn exists", !!document.getElementById("manageKeepRangeBtn"));

    // Check JSZip script tag
    const scripts = Array.from(document.querySelectorAll('script[src]'));
    check("JSZip script loaded", scripts.some(s => s.src.includes("jszip")));

    out.firstChild.remove(); // remove "Running…"
    const summary = document.createElement("p");
    summary.innerHTML = `<strong>Browser self-test: ${pass} passed, ${fail} failed</strong>`;
    out.prepend(summary);
  </script>
</body>
</html>
