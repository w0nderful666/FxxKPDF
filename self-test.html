<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FxxKPDF Self-Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 1rem; }
    .pass { color: green; } .fail { color: red; } #results { line-height: 1.9; }
  </style>
</head>
<body>
  <h1>FxxKPDF Browser Self-Test</h1>
  <div id="results">Running…</div>
  <script type="module">
    const out = document.getElementById("results");
    let pass = 0, fail = 0;
    function check(name, ok) {
      const d = document.createElement("div");
      d.className = ok ? "pass" : "fail";
      d.textContent = (ok ? "✅ " : "❌ ") + name;
      out.appendChild(d);
      ok ? pass++ : fail++;
    }
    // Basic DOM checks
    check("document exists", true);
    check("script runs in browser", typeof window !== "undefined");
    out.firstChild.remove(); // remove "Running…"
    const summary = document.createElement("p");
    summary.innerHTML = `<strong>Browser self-test: ${pass} passed, ${fail} failed</strong>`;
    out.prepend(summary);
  </script>
</body>
</html>
